<header class="site-header">
  <div class="container nav-shell">
    <a class="brand" href="./index.html">
      <img src="./home-preview.png" alt="寒合國小校徽" />
      <div>
        <span class="brand-kicker">HANHA ELEMENTARY SCHOOL</span>
        <strong>寒合國小</strong>
      </div>
    </a>

    <button class="menu-toggle" aria-label="開啟選單">
      <span class="hamburger"></span>
    </button>

    <nav class="main-nav" aria-label="主導覽">
      <a href="./index.html">首頁</a>
      <a href="./new-students.html">新生專區</a>
      <a href="./transfer.html">轉學專區</a>
      <a href="./registration.html">報名專區</a>
      <a class="active" href="./about.html">關於我們</a>
    </nav>
  </div>
  <div class="nav-overlay"></div>
</header>

<script>
  // 這裡寫在 header.html 內部，確保 fetch 完後立刻執行
  (function() {
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.main-nav');
    const overlay = document.querySelector('.nav-overlay');

    if (toggle) {
      toggle.onclick = function() {
        toggle.classList.toggle('active');
        nav.classList.toggle('active');
        overlay.classList.toggle('active');
      };
    }
    
    if (overlay) {
      overlay.onclick = function() {
        toggle.classList.remove('active');
        nav.classList.remove('active');
        overlay.classList.remove('active');
      };
    }
  })();
</script>
