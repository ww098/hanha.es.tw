<header class="site-header">
  <div class="container nav-shell">
    <a class="brand" href="./index.html">
      <img src="./home-preview.png" alt="寒合國小校徽" />
      <div class="brand-text">
        <span class="brand-kicker">HANHA ELEMENTARY SCHOOL</span>
        <strong>寒合國小</strong>
      </div>
    </a>

    <button class="menu-toggle" id="menuBtn">
      <span class="hamburger"></span>
    </button>

    <nav class="main-nav" id="mainNav">
      <a href="./index.html">首頁</a>
      <a href="./new-students.html">新生專區</a>
      <a href="./transfer.html">轉學專區</a>
      <a href="./registration.html">報名專區</a>
      <a href="./about.html" class="nav-about">關於我們</a>
    </nav>
  </div>
  <div class="nav-overlay" id="navOverlay"></div>
</header>

<script>
  (function() {
    const btn = document.getElementById('menuBtn');
    const nav = document.getElementById('mainNav');
    const overlay = document.getElementById('navOverlay');

    function toggle() {
      btn.classList.toggle('active');
      nav.classList.toggle('active');
      overlay.classList.toggle('active');
    }

    btn.onclick = toggle;
    overlay.onclick = toggle;

    // 自動偵測當前頁面標註 active (解決 about.html 不同步問題)
    const currentPath = window.location.pathname;
    if (currentPath.includes('about.html')) {
      document.querySelectorAll('.main-nav a').forEach(a => {
        if(a.href.includes('about.html')) a.classList.add('active');
      });
    }
  })();
</script>
