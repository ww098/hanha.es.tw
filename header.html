<header class="site-header">
  <div class="container nav-shell">
    <a class="brand" href="./index.html">
      <img src="./home-preview.png" alt="寒合國小校徽" />
      <div class="brand-text">
        <span class="brand-kicker" style="display:block; font-size:0.65rem; opacity:0.7;">HANHA ELEMENTARY SCHOOL</span>
        <strong>寒合國小</strong>
      </div>
    </a>

    <nav class="desktop-nav">
      <a href="./index.html">首頁</a>
      <a href="./new-students.html">新生專區</a>
      <a href="./transfer.html">轉學專區</a>
      <a href="./registration.html">報名專區</a>
      <a href="./about.html">關於我們</a>
    </nav>

    <button class="menu-toggle" id="menuBtn">
      <span class="hamburger"></span>
    </button>
  </div>
</header>

<nav class="mobile-nav-panel" id="mobileNav">
  <a href="./index.html">首頁</a>
  <a href="./new-students.html">新生專區</a>
  <a href="./transfer.html">轉學專區</a>
  <a href="./registration.html">報名專區</a>
  <a href="./about.html">關於我們</a>
</nav>

<div class="nav-overlay" id="navOverlay"></div>

<script>
(function() {
  const btn = document.getElementById('menuBtn');
  const mobileNav = document.getElementById('mobileNav');
  const overlay = document.getElementById('navOverlay');

  function toggle() {
    // 同步切換 class
    const isOpening = !mobileNav.classList.contains('is-active');
    
    btn.classList.toggle('is-active', isOpening);
    mobileNav.classList.toggle('is-active', isOpening);
    overlay.classList.toggle('is-active', isOpening);
    
    document.body.style.overflow = isOpening ? 'hidden' : '';
  }

  if(btn) btn.onclick = toggle;
  if(overlay) overlay.onclick = toggle;

  // 自動標記 Active
  const currentPath = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.desktop-nav a, .mobile-nav-panel a').forEach(a => {
    if(a.getAttribute('href').includes(currentPath)) {
      a.classList.add('active');
    }
  });
})();
</script>
