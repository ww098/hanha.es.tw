<header class="site-header">
  <div class="container nav-shell">
    <a class="brand" href="./index.html">
      <img src="./home-preview.png" alt="寒合國小校徽" />
      <div class="brand-text">
        <span class="brand-kicker" style="display:block; font-size:0.65rem; opacity:0.7;">HANHA ELEMENTARY SCHOOL</span>
        <strong>寒合國小</strong>
      </div>
    </a>

    <nav class="desktop-nav">
      <a href="./index.html">首頁</a>
      <a href="./new-students.html">新生專區</a>
      <a href="./transfer.html">轉學專區</a>
      <a href="./registration.html">報名專區</a>
      <a href="./about.html">關於我們</a>
    </nav>

    <button class="menu-toggle" id="menuBtn">
      <span class="hamburger"></span>
    </button>
  </div>
</header>

<nav class="mobile-nav-panel" id="mobileNav">
  <a href="./index.html">首頁</a>
  <a href="./new-students.html">新生專區</a>
  <a href="./transfer.html">轉學專區</a>
  <a href="./registration.html">報名專區</a>
  <a href="./about.html">關於我們</a>
</nav>

<div class="nav-overlay" id="navOverlay"></div>

<script>
  (function() {
    const btn = document.getElementById('menuBtn');
    const mobileNav = document.getElementById('mobileNav');
    const overlay = document.getElementById('navOverlay');

    function toggleMenu() {
      btn.classList.toggle('active');
      mobileNav.classList.toggle('active');
      overlay.classList.toggle('active');
      document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
    }

    if(btn) btn.onclick = toggleMenu;
    if(overlay) overlay.onclick = toggleMenu;

    // --- 強化版 Active 狀態偵測 ---
    const currentFile = window.location.pathname.split('/').pop() || 'index.html';
    const allLinks = document.querySelectorAll('.desktop-nav a, .mobile-nav-panel a');
    
    allLinks.forEach(link => {
      const linkFile = link.getAttribute('href').replace('./', '');
      if (currentFile === linkFile) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
  })();
</script>
