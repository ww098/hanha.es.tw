<nav class="mobile-nav-panel" id="mobileNav">
  <a href="./index.html">首頁</a>
  <a href="./new-students.html">新生專區</a>
  <a href="./transfer.html">轉學專區</a>

  <a href="./about.html">關於我們</a>
</nav>

<div class="nav-overlay" id="navOverlay"></div>

<script>
  (function() {
    const btn = document.getElementById('menuBtn');
    const nav = document.getElementById('mobileNav');
    const mask = document.getElementById('navOverlay');

    function toggle() {
      btn.classList.toggle('is-active');
      nav.classList.toggle('is-active');
      mask.classList.toggle('is-active');
      document.body.style.overflow = nav.classList.contains('is-active') ? 'hidden' : '';
    }

    if(btn) btn.onclick = toggle;
    if(mask) mask.onclick = toggle;

    // 自動偵測當前頁面 Active
    const currentPath = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.desktop-nav a, .mobile-nav-panel a').forEach(a => {
      if(a.getAttribute('href').includes(currentPath)) a.classList.add('active');
    });
  })();
</script>
