<script>
  // 使用最直接的 ID 綁定，避免 iPhone 上失效
  (function() {
    const btn = document.getElementById('mobile-btn');
    const nav = document.getElementById('mobile-nav');

    if (btn && nav) {
      btn.onclick = function(e) {
        e.preventDefault();
        btn.classList.toggle('active');
        nav.classList.toggle('active');
      };
    }
  })();
</script>
