<header class="site-header">
  <div class="container nav-shell">
    <a class="brand" href="./index.html">
      <img src="./home-preview.png" alt="寒合國小校徽" />
      <div class="brand-text">
        <span class="brand-kicker">HANHA ELEMENTARY SCHOOL</span>
        <strong>寒合國小</strong>
      </div>
    </a>

    <nav class="desktop-nav">
      <a href="./index.html">首頁</a>
      <a href="./new-students.html">新生專區</a>
      <a href="./transfer.html">轉學專區</a>
      <a href="./registration.html">報名專區</a>
      <a href="./about.html">關於我們</a>
    </nav>

    <button class="menu-toggle" id="menuBtn">
      <span class="hamburger"></span>
    </button>
  </div>
</header>

<nav class="mobile-nav-panel" id="mobileNav">
  <a href="./index.html">首頁</a>
  <a href="./new-students.html">新生專區</a>
  <a href="./transfer.html">轉學專區</a>
  <a href="./registration.html">報名專區</a>
  <a href="./about.html">關於我們</a>
</nav>

<div class="nav-overlay" id="navOverlay"></div>

<script>
  (function() {
    const btn = document.getElementById('menuBtn');
    const mobileNav = document.getElementById('mobileNav');
    const overlay = document.getElementById('navOverlay');

    function toggleMenu() {
      // 統一使用 is-active 類別
      const activeState = btn.classList.toggle('is-active');
      mobileNav.classList.toggle('is-active');
      overlay.classList.toggle('is-active');
      
      document.body.style.overflow = activeState ? 'hidden' : '';
    }

    if(btn) btn.onclick = toggleMenu;
    if(overlay) overlay.onclick = toggleMenu;

    // 自動偵測頁面路徑標記 Active
    const currentPage = window.location.pathname.split("/").pop() || "index.html";
    document.querySelectorAll('.desktop-nav a, .mobile-nav-panel a').forEach(link => {
      const href = link.getAttribute('href').split("/").pop();
      if (currentPage === href) {
        link.classList.add('active');
      }
    });
  })();
</script>
