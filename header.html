<script>
  // 使用更保險的事件監聽方式
  (function() {
    const btn = document.getElementById('nav-trigger');
    const menu = document.getElementById('nav-menu');

    if (btn && menu) {
      // 同時支援點擊與觸控
      const toggle = function(e) {
        e.preventDefault();
        btn.classList.toggle('active');
        menu.classList.toggle('active');
      };

      btn.addEventListener('click', toggle);
    }
  })();
</script>
