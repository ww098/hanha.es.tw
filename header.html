<header class="site-header">
  <div class="nav-shell">
    <a class="brand" href="./index.html">
      <img src="./logo.png" alt="寒合國小校徽"> <div class="brand-text">
        <span class="brand-kicker">HANHA ELEMENTARY SCHOOL</span>
        <strong>寒合國小</strong>
      </div>
    </a>

    <nav class="main-nav">
      <a href="./index.html" class="nav-link">首頁</a>
      <a href="./about.html" class="nav-link">學校簡介</a>
      <a href="./news.html" class="nav-link">校園公告</a>
      <a href="./resources.html" class="nav-link">學習資源</a>
    </nav>

    <button class="menu-toggle" id="menuBtn">
      <span class="hamburger"></span>
    </button>
  </div>
</header>

<nav class="mobile-nav-panel" id="mobileNav">
  <a href="./index.html">首頁</a>
  <a href="./about.html">學校簡介</a>
  <a href="./news.html">校園公告</a>
  <a href="./resources.html">學習資源</a>
</nav>

<div class="nav-overlay" id="navOverlay"></div>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const mobileNav = document.getElementById('mobileNav');
  const navOverlay = document.getElementById('navOverlay');
  const body = document.body;

  function toggleMenu() {
    // 切換按鈕的叉叉狀態
    menuBtn.classList.toggle('is-active');
    // 切換側邊欄滑出狀態
    mobileNav.classList.toggle('is-active');
    // 切換背景遮罩顯示
    navOverlay.classList.toggle('is-active');
    // 防止手機版開啟選單時背景還能滾動
    body.style.overflow = body.style.overflow === 'hidden' ? '' : 'hidden';
  }

  menuBtn.addEventListener('click', toggleMenu);
  navOverlay.addEventListener('click', toggleMenu);

  // 點擊選單內的連結後自動關閉選單
  const mobileLinks = mobileNav.querySelectorAll('a');
  mobileLinks.forEach(link => {
    link.addEventListener('click', () => {
      if (mobileNav.classList.contains('is-active')) {
        toggleMenu();
      }
    });
  });
</script>
